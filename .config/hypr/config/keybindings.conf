# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ KEYBINDINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ───────── Mouse & Gestures ─────────
gesture = 3, horizontal, workspace
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ───────── Window Management ─────────
# Close window
bind  = ALT,            F4,     killactive,
bind  = $mainMod,       Q,      killactive,

# Float / Tile / Fullscreen
bind  = $mainMod SHIFT, F,      togglefloating,
bind  = $mainMod,       F11,    fullscreen, 0
bind  = $mainMod SHIFT, Return, fullscreen, 1

# Pin (always on top, ignores workspace)
bind  = $mainMod SHIFT, P,      pin,

# Center floating window
bind  = $mainMod SHIFT, C,      centerwindow,

# Move focus (arrow keys)
bind  = $mainMod, left,  movefocus, l
bind  = $mainMod, right, movefocus, r
bind  = $mainMod, up,    movefocus, u
bind  = $mainMod, down,  movefocus, d

# Move focus (vim keys)
bind  = $mainMod, H,     movefocus, l
bind  = $mainMod, L,     movefocus, r
bind  = $mainMod, K,     movefocus, u
bind  = $mainMod, J,     movefocus, d

# Move window position
bind  = $mainMod CTRL, left,  movewindow, l
bind  = $mainMod CTRL, right, movewindow, r
bind  = $mainMod CTRL, up,    movewindow, u
bind  = $mainMod CTRL, down,  movewindow, d

# Resize window (hold and repeat)
binde = $mainMod SHIFT, left,  resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive,  50 0
binde = $mainMod SHIFT, up,    resizeactive,  0 -50
binde = $mainMod SHIFT, down,  resizeactive,  0  50

# ───────── Applications & Launchers ─────────
# SUPER alone → App Launcher (fires on release only — identical to Windows/GNOME behavior)
bindr = SUPER,    Super_L, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle applauncher
bind  = $mainMod, D,       exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle applauncher

# Core apps
bind  = $mainMod, Return, exec, $terminal
bind  = $mainMod, E,      exec, nautilus
bind  = $mainMod, F,      exec, firefox
bind  = $mainMod, T,      exec, telegram-desktop
bind  = $mainMod, O,      exec, obsidian

# ───────── Quickshell Panels ─────────
bind  = $mainMod,       R,  exec, bash ~/.config/hypr/scripts/reload.sh
bind  = $mainMod,       C,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle clipboard
bind  = $mainMod,       P,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle movies
bind  = $mainMod SHIFT, S,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle settings
bind  = $mainMod,       M,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
bind  = $mainMod,       B,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind  = $mainMod,       W,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind  = $mainMod,       S,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle calendar
bind  = $mainMod,       N,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle network
bind  = $mainMod SHIFT, T,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind  = $mainMod,       V,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume
bind  = $mainMod SHIFT, H,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind  = $mainMod SHIFT, M,  exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle monitors

# ───────── System & Hardware ─────────
# Lock screen
bind  = $mainMod, Escape,   exec, bash ~/.config/hypr/scripts/lock.sh
bindl = , XF86PowerOff,     exec, bash ~/.config/hypr/scripts/lock.sh

# Screenshot
bindl    = ,             Print, exec, bash ~/.config/hypr/scripts/screenshot.sh
bindl    = SHIFT,        Print, exec, bash ~/.config/hypr/scripts/screenshot.sh --edit
bindl    = SUPER,        Print, exec, bash ~/.config/hypr/scripts/screenshot.sh --full
bindl    = SUPER SHIFT,  Print, exec, bash ~/.config/hypr/scripts/screenshot.sh --full --edit

# Brightness
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise

# Caps Lock OSD
bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock

# ───────── Media & Audio ─────────
bindl  = $mainMod, SPACE,              exec, playerctl play-pause
bindl  = , XF86AudioPlay,             exec, playerctl play-pause
bindl  = , XF86AudioPause,            exec, playerctl play-pause
bindl  = , XF86AudioNext,             exec, playerctl next
bindl  = , XF86AudioPrev,             exec, playerctl previous
bindl  = , xf86AudioMicMute,          exec, swayosd-client --input-volume mute-toggle
bindl  = , xf86audiomute,             exec, swayosd-client --output-volume mute-toggle
bindel = , xf86audiolowervolume,      exec, swayosd-client --output-volume lower
bindel = , xf86audioraisevolume,      exec, swayosd-client --output-volume raise

# ───────── Workspaces ─────────
bind = $mainMod, 1, exec, bash ~/.config/hypr/scripts/qs_manager.sh 1
bind = $mainMod, 2, exec, bash ~/.config/hypr/scripts/qs_manager.sh 2
bind = $mainMod, 3, exec, bash ~/.config/hypr/scripts/qs_manager.sh 3
bind = $mainMod, 4, exec, bash ~/.config/hypr/scripts/qs_manager.sh 4
bind = $mainMod, 5, exec, bash ~/.config/hypr/scripts/qs_manager.sh 5
bind = $mainMod, 6, exec, bash ~/.config/hypr/scripts/qs_manager.sh 6
bind = $mainMod, 7, exec, bash ~/.config/hypr/scripts/qs_manager.sh 7
bind = $mainMod, 8, exec, bash ~/.config/hypr/scripts/qs_manager.sh 8
bind = $mainMod, 9, exec, bash ~/.config/hypr/scripts/qs_manager.sh 9
bind = $mainMod, 0, exec, bash ~/.config/hypr/scripts/qs_manager.sh 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, exec, bash ~/.config/hypr/scripts/qs_manager.sh 1 move
bind = $mainMod SHIFT, 2, exec, bash ~/.config/hypr/scripts/qs_manager.sh 2 move
bind = $mainMod SHIFT, 3, exec, bash ~/.config/hypr/scripts/qs_manager.sh 3 move
bind = $mainMod SHIFT, 4, exec, bash ~/.config/hypr/scripts/qs_manager.sh 4 move
bind = $mainMod SHIFT, 5, exec, bash ~/.config/hypr/scripts/qs_manager.sh 5 move
bind = $mainMod SHIFT, 6, exec, bash ~/.config/hypr/scripts/qs_manager.sh 6 move
bind = $mainMod SHIFT, 7, exec, bash ~/.config/hypr/scripts/qs_manager.sh 7 move
bind = $mainMod SHIFT, 8, exec, bash ~/.config/hypr/scripts/qs_manager.sh 8 move
bind = $mainMod SHIFT, 9, exec, bash ~/.config/hypr/scripts/qs_manager.sh 9 move
bind = $mainMod SHIFT, 0, exec, bash ~/.config/hypr/scripts/qs_manager.sh 10 move

# Special workspace (scratchpad)
bind = $mainMod,       grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, grave, movetoworkspace,        special:scratchpad

# Multi-monitor focus cycling
bind = $mainMod, TAB, exec, bash ~/.config/hypr/scripts/focus_next_monitor.sh

# ───────── Desktop Context Menu ─────────
# Right-click style menu (categories, all apps, system actions)
bind = $mainMod, X, exec, nwg-menu
