# Must be FIRST — fixes file pickers, screenshots, screen share across all apps
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user start hyprpolkitagent
exec-once = awww-daemon
exec-once = hypridle
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Shell.qml
exec-once = ~/.config/hypr/scripts/quickshell/focustime/launch_daemon.sh
exec-once = ~/.config/hypr/scripts/init.sh
exec-once = ~/.config/hypr/scripts/settings_watcher.sh &
exec-once = playerctld
exec-once = swayosd-server --top-margin 0.9 --style "$HOME/.config/swayosd/style.css"
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ~/.config/hypr/scripts/volume_listener.sh
exec-once = ~/.config/hypr/scripts/update_notifier.sh
exec-once = udiskie --tray
exec-once = blueman-applet
exec-once = xdg-user-dirs-update
exec-once = /usr/lib/gnome-keyring-daemon --start --components=secrets,pkcs11,ssh
exec-once = bash -c 'sleep 1 && ~/.config/hypr/scripts/qs_manager.sh toggle guide'
