# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ◈ WINDOW & LAYER RULES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

layerrule {
    name = "lr1"
    match:namespace = ^(volume_osd)$
    no_anim = on
}

layerrule {
    name = "lr2"
    match:namespace = ^(brightness_osd)$
    no_anim = on
}

layerrule {
    name = "lr3"
    match:namespace = hyprpicker
    no_anim = on
}

layerrule {
    name = "lr4"
    match:namespace = qsdock
    no_anim = on
}

layerrule {
    name = "lr5"
    match:namespace = ext-session-lock
    blur = on
    ignore_alpha = 0.2
}

# ─────────────────────────────
# Window rules
# ─────────────────────────────

# ───────── App Launcher ─────────
windowrule {
    name = "app_launcher"
    match:title = ^(app-launcher)$
    float = on
    center = on
    size = 1200 600
    animation = slide
}

# ───────── MASTER QUICKSHELL CONTAINER ─────────
windowrule {
    name = "master_rule"
    match:title = ^(qs-master)$
    float = on
    no_shadow = on
    no_initial_focus = on
}

# ───────── DE-like Floating Windows ─────────
# File open/save dialogs always float and center
windowrule {
    name = "file_dialog"
    match:title = ^(Open|Save|Open File|Save File|Save As|Choose File|Select File|Browse)(.*)$
    float = on
    center = on
    size = 900 600
}

# Calculator
windowrule {
    name = "calculator"
    match:class = ^(gnome-calculator|org.gnome.Calculator)$
    float = on
    center = on
    size = 420 620
}

# Font viewer
windowrule {
    name = "font_viewer"
    match:class = ^(gnome-font-viewer|org.gnome.font-viewer)$
    float = on
    center = on
    size = 800 600
}

# Bluetooth manager
windowrule {
    name = "bluetooth"
    match:class = ^(blueman-manager)$
    float = on
    center = on
    size = 700 500
}

# Archive manager
windowrule {
    name = "archive"
    match:class = ^(file-roller|org.gnome.FileRoller)$
    float = on
    center = on
    size = 800 600
}

# Volume mixer
windowrule {
    name = "pavucontrol"
    match:class = ^(pavucontrol)$
    float = on
    center = on
    size = 800 500
}

# Nautilus — sensible default size
windowrule {
    name = "nautilus_size"
    match:class = ^(org.gnome.Nautilus)$
    size = 1100 720
    center = on
}

# PDF viewer
windowrule {
    name = "evince"
    match:class = ^(evince|org.gnome.Evince)$
    size = 1100 800
    center = on
}

# Picture-in-Picture (YouTube, Firefox, etc.)
windowrule {
    name = "pip"
    match:title = ^(Picture.in.Picture)$
    float = on
    pin = on
    size = 640 360
    move = 1260 680
}

# Color picker (hyprpicker)
windowrule {
    name = "hyprpicker"
    match:class = ^(hyprpicker)$
    float = on
    center = on
}

# nwg-menu (right-click desktop menu)
windowrule {
    name = "nwg_menu"
    match:class = ^(nwg-menu)$
    float = on
    no_focus = on
    no_initial_focus = on
}
